services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # ソースコードをホットリロード対応でマウント
      - .:/app
      # node_modules はコンテナ内のものを優先
      - /app/node_modules
      # .next キャッシュもコンテナ内を優先
      - /app/.next
    environment:
      - NODE_ENV=development
